<!DOCTYPE html>
<html>
<head>

<title>VALLA Admin</title>

<style>

body{
font-family:Arial;
background:#f5efe6;
padding:40px;
}

.box{
background:white;
padding:30px;
max-width:500px;
margin:auto;
box-shadow:0 10px 30px #0003;
}

input,textarea{
width:100%;
padding:10px;
margin:10px 0;
}

button{
background:#17130f;
color:white;
padding:12px 25px;
border:0;
cursor:pointer;
}

#panel{
display:none;
}

</style>

</head>


<body>


<div class="box">


<h1>VALLA Admin</h1>


<div id="login">

<p>Unesi šifru:</p>

<input id="pass" type="password">

<button onclick="login()">
Ulaz
</button>

</div>



<div id="panel">

<h2>Nova lampa</h2>


<input id="ime" placeholder="Naziv lampe">

<input id="cena" placeholder="Cena">

<textarea id="opis" placeholder="Opis"></textarea>


<button onclick="sacuvaj()">
Sačuvaj
</button>


<textarea id="rezultat" style="height:200px"></textarea>


</div>



</div>




<script>


function login(){

let sifra=document.getElementById("pass").value;


if(sifra=="VALLA2026"){

document.getElementById("login").style.display="none";

document.getElementById("panel").style.display="block";

}

else{

alert("Pogrešna šifra");

}

}

function sacuvaj(){

let ime=document.getElementById("ime").value;
let cena=document.getElementById("cena").value;
let opis=document.getElementById("opis").value;


let proizvod =
`
{
"ime":"${ime}",
"cena":"${cena}",
"opis":"${opis}"
}
`;


document.getElementById("rezultat").value=proizvod;

}
</script>


</body>
</html>
